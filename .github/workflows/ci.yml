name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend
        run: dotnet restore backend/ThcMealPlanner.sln

      - name: Build backend
        run: dotnet build backend/ThcMealPlanner.sln --no-restore --configuration Release

      - name: Test backend with coverage
        run: dotnet test backend/ThcMealPlanner.sln --no-build --configuration Release --collect:"XPlat Code Coverage"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Ensure frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Test frontend with coverage
        working-directory: ./frontend
        run: npm run test -- --coverage

  infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Lambda (linux-arm64)
        run: >
          dotnet publish backend/ThcMealPlanner.Api/ThcMealPlanner.Api.csproj
          -c Release -r linux-arm64 --self-contained true
          -p:PublishAot=false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            infra/package-lock.json

      - name: Ensure infra lockfile
        working-directory: ./infra
        run: npm install --package-lock-only

      - name: Install infra dependencies
        working-directory: ./infra
        run: npm ci

      - name: CDK synth (dev)
        working-directory: ./infra
        env:
          CDK_DEFAULT_ACCOUNT: '425061472162'
          CDK_DEFAULT_REGION: 'us-east-1'
        run: npx cdk synth --context env=dev
