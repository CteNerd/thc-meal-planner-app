name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      BACKEND_COVERAGE_MIN: '80'
      BACKEND_COVERAGE_TARGET: '82'
      BACKEND_BRANCH_COVERAGE_MIN: '50'
      BACKEND_BRANCH_COVERAGE_TARGET: '55'
      BACKEND_CHANGED_FILES_LINE_TARGET: '80'
      BACKEND_CHANGED_FILES_BRANCH_TARGET: '80'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend
        run: dotnet restore backend/ThcMealPlanner.sln

      - name: Build backend
        run: dotnet build backend/ThcMealPlanner.sln --no-restore --configuration Release

      - name: Test backend with coverage
        run: >
          dotnet test backend/ThcMealPlanner.Tests/ThcMealPlanner.Tests.csproj
          --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory backend/TestResults

      - name: Generate backend coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:backend/TestResults/**/coverage.cobertura.xml" \
            "-targetdir:backend/TestResults/CoverageReport" \
            "-reporttypes:Html"

      - name: Enforce backend coverage threshold
        run: |
          python3 .github/scripts/coverage_gate.py backend \
            --event-name "${GITHUB_EVENT_NAME}" \
            --base-ref "${GITHUB_BASE_REF}" \
            --line-min "${BACKEND_COVERAGE_MIN}" \
            --line-target "${BACKEND_COVERAGE_TARGET}" \
            --branch-min "${BACKEND_BRANCH_COVERAGE_MIN}" \
            --branch-target "${BACKEND_BRANCH_COVERAGE_TARGET}" \
            --changed-line-target "${BACKEND_CHANGED_FILES_LINE_TARGET}" \
            --changed-branch-target "${BACKEND_CHANGED_FILES_BRANCH_TARGET}"

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          if-no-files-found: warn
          path: |
            backend/TestResults/CoverageReport
            backend/TestResults/**/coverage.cobertura.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Ensure frontend lockfile
        working-directory: ./frontend
        run: npm install --package-lock-only

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Test frontend with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Enforce frontend coverage policy
        run: |
          python3 .github/scripts/coverage_gate.py frontend \
            --summary-file frontend/coverage/coverage-summary.json \
            --threshold-file frontend/coverage-thresholds.json \
            --event-name "${GITHUB_EVENT_NAME}" \
            --base-ref "${GITHUB_BASE_REF}"

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          if-no-files-found: warn
          path: |
            frontend/coverage

  e2e-smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        working-directory: ./frontend
        run: npm run test:e2e:smoke

  infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Publish Lambda (linux-arm64)
        run: >
          dotnet publish backend/ThcMealPlanner.Api/ThcMealPlanner.Api.csproj
          -c Release -r linux-arm64 --self-contained true
          -p:PublishAot=false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            infra/package-lock.json

      - name: Ensure infra lockfile
        working-directory: ./infra
        run: npm install --package-lock-only

      - name: Install infra dependencies
        working-directory: ./infra
        run: npm ci

      - name: CDK synth (dev)
        working-directory: ./infra
        env:
          CDK_DEFAULT_ACCOUNT: '425061472162'
          CDK_DEFAULT_REGION: 'us-east-1'
        run: npx cdk synth --context env=dev
