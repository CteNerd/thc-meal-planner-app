<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | THC Meal Planner</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        width: min(560px, 92vw);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>The planner will reconnect automatically when your network is available again.</p>
    </main>
  </body>
</html>
